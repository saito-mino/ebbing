<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e1220">
<title>〇×エビング</title>
<style>
  :root{
    --bg:#0e1220; --card:#181d30; --card2:#212842;
    --accent:#2dd4bf; --accent2:#38bdf8;
    --ebb:#fb923c; --ebb2:#f43f5e;
    --ok:#34d399; --ng:#fb7185; --warn:#fbbf24;
    --text:#eef1fa; --muted:#94a0bd; --line:#2c3450;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    line-height:1.6;overscroll-behavior:none;-webkit-font-smoothing:antialiased;
  }
  #app{max-width:680px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;
    padding:env(safe-area-inset-top) 0 0 0;}
  .view{flex:1;padding:16px 16px 96px;display:none;}
  .view.active{display:block;animation:fade .18s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){ .view.active{animation:none} }

  header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 4px;}
  header h1{font-size:18px;font-weight:800;letter-spacing:.02em;}
  header h1 .ebb-c{color:var(--ebb);}
  header .sub{font-size:11px;color:var(--muted);}

  .hero{display:flex;flex-direction:column;gap:12px;margin-top:8px;}
  .big-btn{position:relative;background:linear-gradient(135deg,#123c3a,#0f2f3f);
    border:1px solid var(--accent);color:var(--text);border-radius:16px;
    padding:20px 18px;font-size:18px;font-weight:800;cursor:pointer;text-align:left;
    font-family:inherit;display:flex;flex-direction:column;gap:4px;}
  .big-btn .ico{font-size:24px;}
  .big-btn small{font-size:12px;font-weight:500;color:var(--muted);}
  .ebb-btn{position:relative;background:linear-gradient(135deg,#3a2313,#3f1a24);
    border:1px solid var(--ebb);color:var(--text);border-radius:16px;
    padding:20px 18px;font-size:18px;font-weight:800;cursor:pointer;text-align:left;
    font-family:inherit;display:flex;flex-direction:column;gap:4px;}
  .ebb-btn small{font-size:12px;font-weight:500;color:var(--muted);}
  .badge{position:absolute;top:-8px;right:-6px;background:var(--ebb2);color:#fff;
    font-size:12px;font-weight:800;min-width:24px;height:24px;border-radius:999px;
    display:flex;align-items:center;justify-content:center;padding:0 7px;}
  .quick{display:flex;gap:10px;}
  .quick button{flex:1;background:var(--card);border:1px solid var(--line);color:var(--text);
    border-radius:14px;padding:12px 8px;font-size:12px;cursor:pointer;font-family:inherit;
    display:flex;flex-direction:column;align-items:center;gap:2px;}
  .quick .num{font-size:20px;font-weight:800;color:var(--accent);}
  .quick .num.ng{color:var(--ng);}
  .subj-pick{margin-top:4px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;}
  .subj-pick label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px;}
  .subj-pick select{width:100%;background:var(--card2);color:var(--text);border:1px solid var(--line);
    border-radius:10px;padding:11px;font-size:15px;font-family:inherit;}

  /* quiz */
  .q-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .q-prog{font-size:13px;color:var(--muted);font-weight:600;}
  .q-mode{font-size:11px;font-weight:800;border-radius:999px;padding:2px 10px;border:1px solid var(--line);color:var(--muted);}
  .q-mode.ebb{border-color:var(--ebb);color:var(--ebb);}
  .timerbar{height:5px;background:var(--card2);border-radius:99px;overflow:hidden;margin-bottom:14px;}
  .timerbar i{display:block;height:100%;background:var(--accent);width:100%;border-radius:99px;transition:width .95s linear;}
  .timerbar i.warn{background:var(--warn);}
  .timerbar i.hurry{background:var(--ng);}
  .q-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 16px;margin-bottom:14px;}
  .q-subj{display:inline-block;font-size:11px;font-weight:800;color:var(--accent);
    border:1px solid var(--accent);border-radius:999px;padding:1px 10px;margin-bottom:10px;}
  .q-text{font-size:17px;font-weight:700;line-height:1.75;}
  .ans-row{display:flex;gap:10px;}
  .ans-row button{flex:1;border-radius:16px;padding:18px 0;font-size:26px;font-weight:800;
    cursor:pointer;font-family:inherit;border:1px solid var(--line);background:var(--card);color:var(--text);}
  .ans-row .a-maru{border-color:var(--ok);color:var(--ok);}
  .ans-row .a-batsu{border-color:var(--ng);color:var(--ng);}
  .ans-row .a-dunno{font-size:14px;color:var(--muted);}
  .result{margin-top:14px;border-radius:16px;padding:16px;border:1px solid var(--line);background:var(--card);display:none;}
  .result.show{display:block;animation:fade .18s ease;}
  .result .verdict{font-size:18px;font-weight:800;margin-bottom:6px;}
  .result .verdict.ok{color:var(--ok);}
  .result .verdict.ng{color:var(--ng);}
  .result .truth{font-size:14px;margin-bottom:8px;}
  .result .exp{font-size:14px;color:#d4dbf0;background:#12172a;border-radius:10px;padding:10px 12px;margin-bottom:8px;}
  .result .src{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .result .lv{font-size:12.5px;color:var(--muted);border-top:1px dashed var(--line);padding-top:8px;}
  .result .lv b{color:var(--ebb);letter-spacing:2px;}
  .next-btn{width:100%;margin-top:12px;background:var(--accent);color:#06282a;border:none;
    border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;}
  .quit-btn{width:100%;margin-top:8px;background:none;color:var(--muted);border:1px solid var(--line);
    border-radius:14px;padding:11px;font-size:13px;cursor:pointer;font-family:inherit;}
  .done{text-align:center;padding:40px 10px;}
  .done .big{font-size:44px;margin-bottom:10px;}
  .done h2{font-size:19px;margin-bottom:8px;}
  .done p{font-size:13.5px;color:var(--muted);}

  /* manage */
  .m-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .m-head h2{font-size:16px;}
  .m-add{background:var(--accent);color:#06282a;border:none;border-radius:10px;
    padding:9px 14px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}
  .m-filter{width:100%;background:var(--card2);color:var(--text);border:1px solid var(--line);
    border-radius:10px;padding:10px;font-size:14px;font-family:inherit;margin-bottom:10px;}
  .m-item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:8px;}
  .m-item .t{font-size:13.5px;font-weight:600;margin-bottom:5px;}
  .m-item .meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);flex-wrap:wrap;}
  .m-item .meta .mk{font-weight:800;}
  .m-item .meta .mk.o{color:var(--ok);} .m-item .meta .mk.x{color:var(--ng);}
  .m-item .ops{margin-top:7px;display:flex;gap:8px;}
  .m-item .ops button{background:var(--card2);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;}
  .m-item .ops .del{color:var(--ng);border-color:var(--ng);}
  .form{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;display:none;}
  .form.show{display:block;}
  .form label{display:block;font-size:12px;color:var(--muted);margin:9px 0 4px;}
  .form input[type=text],.form textarea,.form select{width:100%;background:var(--card2);color:var(--text);
    border:1px solid var(--line);border-radius:10px;padding:10px;font-size:15px;font-family:inherit;}
  .form textarea{min-height:72px;resize:vertical;}
  .truth-row{display:flex;gap:10px;margin-top:4px;}
  .truth-row button{flex:1;border-radius:10px;padding:12px 0;font-size:20px;font-weight:800;
    cursor:pointer;font-family:inherit;background:var(--card2);border:1px solid var(--line);color:var(--muted);}
  .truth-row button.sel-o{border-color:var(--ok);color:var(--ok);background:#0f2e26;}
  .truth-row button.sel-x{border-color:var(--ng);color:var(--ng);background:#331a22;}
  .form .save{width:100%;margin-top:14px;background:var(--accent);color:#06282a;border:none;
    border-radius:12px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;}

  /* stats */
  .s-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .s-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;}
  .s-card .k{font-size:11px;color:var(--muted);}
  .s-card .v{font-size:23px;font-weight:800;color:var(--accent);}
  .s-sec{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;}
  .s-sec h3{font-size:14px;margin-bottom:10px;}
  .lvrow{display:flex;align-items:center;gap:10px;margin-bottom:7px;font-size:12.5px;}
  .lvrow .lab{width:88px;color:var(--muted);letter-spacing:1px;}
  .lvrow .bar{flex:1;height:9px;background:var(--card2);border-radius:99px;overflow:hidden;}
  .lvrow .bar i{display:block;height:100%;background:var(--ebb);border-radius:99px;}
  .lvrow .n{width:34px;text-align:right;color:var(--muted);}
  .duerow{display:flex;justify-content:space-between;font-size:13.5px;padding:7px 0;border-bottom:1px dashed var(--line);}
  .duerow:last-child{border-bottom:none;}
  .duerow b{color:var(--ebb);}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;font-size:14px;padding:4px 0;}
  .sw{position:relative;width:52px;height:30px;background:var(--card2);border:1px solid var(--line);
    border-radius:99px;cursor:pointer;transition:.2s;}
  .sw i{position:absolute;top:3px;left:3px;width:22px;height:22px;background:var(--muted);border-radius:50%;transition:.2s;}
  .sw.on{background:#0f3e3a;border-color:var(--accent);}
  .sw.on i{left:25px;background:var(--accent);}
  .tool-btn{background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:12px;
    padding:13px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;margin-top:8px;}
  .danger{background:var(--card);border:1px solid var(--ng);color:var(--ng);border-radius:12px;
    padding:13px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;margin-top:8px;}

  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(14,18,32,.95);
    backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;
    padding:6px 0 calc(6px + env(safe-area-inset-bottom));max-width:680px;margin:0 auto;}
  nav button{flex:1;background:none;border:none;color:var(--muted);font-size:10px;cursor:pointer;
    padding:6px 0;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;}
  nav button .ico{font-size:21px;line-height:1;}
  nav button.active{color:var(--accent);}
  nav button:focus-visible,button:focus-visible,select:focus-visible,input:focus-visible,textarea:focus-visible{
    outline:2px solid var(--accent2);outline-offset:2px;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--card2);color:var(--text);padding:12px 20px;border-radius:999px;font-size:14px;
    font-weight:600;opacity:0;transition:.25s;pointer-events:none;z-index:50;border:1px solid var(--line);max-width:90%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>〇×<span class="ebb-c">エビング</span></h1>
      <div class="sub" id="subCount">問題 0 問</div>
    </div>
    <div class="sub">忘れる直前に、もう一度。</div>
  </header>

  <!-- HOME -->
  <section class="view active" id="view-home">
    <div class="hero">
      <button class="big-btn" onclick="startQuiz('all')">
        <span class="ico">⚡</span>スタート
        <small>タップで即ランダム ○×出題</small>
      </button>
      <button class="ebb-btn" id="ebbBtn" onclick="startQuiz('ebbing')">
        🦐 エビングモード
        <small id="ebbSub">忘れる直前の問題から復習</small>
        <span class="badge" id="ebbBadge" style="display:none">0</span>
      </button>
      <div class="quick">
        <button onclick="startQuiz('mistakes')">
          <span class="num ng" id="qMiss">0</span><span>間違えた問題だけ</span>
        </button>
        <button onclick="goView('stats')">
          <span class="num" id="qAcc">—</span><span>正答率を見る</span>
        </button>
      </div>
      <div class="subj-pick">
        <label for="subjSelect">科目をしぼって出題</label>
        <select id="subjSelect" onchange="startBySubject()">
          <option value="">— 科目を選ぶとすぐ出題 —</option>
        </select>
      </div>
    </div>
  </section>

  <!-- QUIZ -->
  <section class="view" id="view-quiz">
    <div class="q-top">
      <span class="q-prog" id="qProg"></span>
      <span class="q-mode" id="qMode"></span>
    </div>
    <div class="timerbar" id="timerBar" style="display:none"><i id="timerFill"></i></div>
    <div id="quizBody">
      <div class="q-card">
        <span class="q-subj" id="qSubj"></span>
        <div class="q-text" id="qText"></div>
      </div>
      <div class="ans-row" id="ansRow">
        <button class="a-maru" onclick="answer(true)">○</button>
        <button class="a-batsu" onclick="answer(false)">×</button>
        <button class="a-dunno" onclick="answer(null)">わからん</button>
      </div>
      <div class="result" id="result">
        <div class="verdict" id="verdict"></div>
        <div class="truth" id="truth"></div>
        <div class="exp" id="exp"></div>
        <div class="src" id="src"></div>
        <div class="lv" id="lvInfo"></div>
        <button class="next-btn" onclick="nextQ()">次の問題へ</button>
      </div>
      <button class="quit-btn" onclick="endQuiz()">出題をやめてホームへ</button>
    </div>
    <div class="done" id="doneBox" style="display:none">
      <div class="big">🎉</div>
      <h2 id="doneTitle">おつかれさま！</h2>
      <p id="doneMsg"></p>
      <button class="next-btn" onclick="goView('home');refreshHome()">ホームへ戻る</button>
    </div>
  </section>

  <!-- MANAGE -->
  <section class="view" id="view-manage">
    <div class="m-head">
      <h2>問題管理</h2>
      <button class="m-add" onclick="openForm()">＋ 追加</button>
    </div>
    <div class="form" id="form">
      <label for="f-subject">科目</label>
      <input type="text" id="f-subject" list="subjList" placeholder="例：入管法">
      <datalist id="subjList"></datalist>
      <label for="f-question">問題文（○×で答えられる命題）</label>
      <textarea id="f-question" placeholder="例：在留カードは常時携帯しなければならない。"></textarea>
      <label>正解</label>
      <div class="truth-row">
        <button id="tO" onclick="setTruth(true)">○</button>
        <button id="tX" onclick="setTruth(false)">×</button>
      </div>
      <label for="f-explain">解説（任意）</label>
      <textarea id="f-explain" placeholder="なぜ○／×なのか"></textarea>
      <label for="f-source">根拠・出典（任意）</label>
      <input type="text" id="f-source" placeholder="例：入管法23条">
      <button class="save" onclick="saveForm()">保存する</button>
    </div>
    <select class="m-filter" id="mFilter" onchange="renderManage()">
      <option value="">すべての科目</option>
    </select>
    <div id="mList"></div>
  </section>

  <!-- STATS -->
  <section class="view" id="view-stats">
    <div class="s-grid">
      <div class="s-card"><div class="k">総解答数</div><div class="v" id="sAttempts">0</div></div>
      <div class="s-card"><div class="k">正答率</div><div class="v" id="sAcc">—</div></div>
    </div>
    <div class="s-sec">
      <h3>🦐 復習の予定</h3>
      <div class="duerow"><span>いま復習どき</span><b id="dueNow">0問</b></div>
      <div class="duerow"><span>明日まで</span><b id="dueTom">0問</b></div>
      <div class="duerow"><span>7日以内</span><b id="dueWeek">0問</b></div>
    </div>
    <div class="s-sec">
      <h3>記憶レベルの分布</h3>
      <div id="lvDist"></div>
    </div>
    <div class="s-sec">
      <h3>設定</h3>
      <div class="toggle-row">
        <span>10秒タイマー</span>
        <div class="sw" id="swTimer" role="switch" aria-checked="true" tabindex="0" onclick="toggleTimer()" onkeydown="if(event.key==='Enter'||event.key===' ')toggleTimer()"><i></i></div>
      </div>
    </div>
    <button class="tool-btn" onclick="exportData()">バックアップを書き出す（JSON）</button>
    <button class="tool-btn" onclick="document.getElementById('importFile').click()">バックアップを読み込む（旧アプリのJSONもOK）</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
    <button class="danger" onclick="resetStats()">学習記録だけリセット</button>
  </section>

  <nav>
    <button class="active" data-v="home" onclick="goView('home')"><span class="ico">⚡</span>出題</button>
    <button data-v="manage" onclick="goView('manage')"><span class="ico">📝</span>問題管理</button>
    <button data-v="stats" onclick="goView('stats')"><span class="ico">📊</span>学習記録</button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
const KEY="ox_ebbing_v1";
const OLD_KEY="shihou_drill_ox_v1";
const DAY=86400000;
/* エビングハウス復習間隔：記憶Lv1→1日後、Lv2→3日後、Lv3→7日後、Lv4→14日後、Lv5→30日後、Lv6→60日後 */
const INTERVALS=[1,3,7,14,30,60];
const MAX_LV=INTERVALS.length;
const TIME_LIMIT=10;

/* ============ 内蔵問題（入管法20問・建設業許可20問） ============ */
const PRELOADED=[
{id:"imm001",subject:"入管法",question:"短期滞在（観光）の在留資格でも、日本の会社でアルバイトとして報酬を得て働くことができる。",correct:false,explain:"できません。短期滞在は観光・親族訪問・短期商用などのための資格で、報酬を伴う就労はできず、資格外活動許可も原則出ません。働くには就労できる在留資格への変更が必要です。",source:"入管法 別表第一（短期滞在）"},
{id:"imm002",subject:"入管法",question:"在留カードは、中長期在留者が常に携帯していなければならない。",correct:true,explain:"常時携帯義務があります（16歳未満は例外）。提示を求められたら応じる必要があり、不携帯には罰則があります。特別永住者証明書は常時携帯義務の扱いが異なる点に注意。",source:"入管法23条（在留カードの携帯・提示義務）"},
{id:"imm003",subject:"入管法",question:"『留学』の在留資格の外国人は、資格外活動許可を受ければ、原則として週28時間以内までアルバイトができる。",correct:true,explain:"資格外活動許可を得れば原則週28時間以内（長期休業期間中は1日8時間以内など）まで就労できます。風俗営業関連の業務は不可。許可なしで働くと不法就労になります。",source:"入管法19条・資格外活動許可"},
{id:"imm004",subject:"入管法",question:"『技術・人文知識・国際業務』（技人国）の在留資格で、工場のライン作業や建設現場の単純作業のみに従事させることができる。",correct:false,explain:"技人国は専門的・技術的分野の在留資格で、いわゆる単純労働のみへの従事はできません。学歴・実務と業務内容の関連性が審査されます。単純作業中心の現場は特定技能などの検討が必要です。",source:"入管法 別表第一の二（技術・人文知識・国際業務）"},
{id:"imm005",subject:"入管法",question:"『永住』の許可を受けることと、日本国籍を取得する『帰化』は、同じ手続きである。",correct:false,explain:"別物です。永住は外国籍のまま在留資格が『永住者』になるもの（出入国在留管理庁）。帰化は日本国籍を取得する手続きで法務大臣の許可（法務局が窓口）。要件も窓口も異なります。",source:"永住＝入管法22条／帰化＝国籍法4条以下"},
{id:"imm006",subject:"入管法",question:"『家族滞在』の在留資格の配偶者は、資格外活動許可を受けなくても、フルタイムで自由に就労できる。",correct:false,explain:"家族滞在は原則就労できません。資格外活動許可を受けて初めて、原則週28時間以内の就労が可能になります。フルタイムで働くには就労可能な在留資格への変更が必要です。",source:"入管法 別表第一（家族滞在）・資格外活動許可"},
{id:"imm007",subject:"入管法",question:"在留期間の更新申請は、在留期間の満了日を過ぎてからでも、いつでも自由に行える。",correct:false,explain:"満了日までに申請が必要です（通常、満了のおおむね3か月前から受付）。満了日を過ぎて在留するとオーバーステイ（不法残留）となり、退去強制の対象になります。",source:"入管法21条（在留期間の更新）"},
{id:"imm008",subject:"入管法",question:"在留資格を失ったまま在留期間を超えて日本にとどまること（オーバーステイ）は、退去強制の対象になる。",correct:true,explain:"不法残留は退去強制事由です。自ら申し出て手続きをする『出国命令制度』など救済の仕組みもありますが、いずれにせよ早急な専門家相談が必要です。",source:"入管法24条（退去強制）"},
{id:"imm009",subject:"入管法",question:"技能実習制度は廃止され、2027年（令和9年）4月から新たに『育成就労』制度が始まる。",correct:true,explain:"2024年（令和6年）の改正で技能実習は発展的に解消され、2027年4月1日から育成就労がスタートします。目的が『人材確保＋育成』に明確化され、育成就労→特定技能1号→2号というキャリアパスが前提です。",source:"改正入管法・育成就労法（令和6年法律第60号）"},
{id:"imm010",subject:"入管法",question:"『特定技能1号』の外国人は、原則として配偶者や子を日本に呼び寄せて一緒に暮らすことができる。",correct:false,explain:"特定技能1号は家族帯同ができません（通算在留5年が上限）。家族帯同や在留期間の上限なしが認められるのは、より高度な特定技能2号です。",source:"入管法 別表第一の二（特定技能）"},
{id:"imm011",subject:"入管法",question:"『特定技能2号』は、在留期間の更新回数に上限がなく、要件を満たせば家族の帯同も認められる。",correct:true,explain:"特定技能2号は熟練技能者向けで、更新に上限がなく家族帯同も可能です。要件を満たせば将来的に永住申請につながる可能性もあります。",source:"入管法 別表第一の二（特定技能2号）"},
{id:"imm012",subject:"入管法",question:"出国後1年以内に再入国する場合は、原則として『みなし再入国許可』により、再入国許可をあらためて受けなくてよい。",correct:true,explain:"有効な在留資格・在留カードを持つ人が、出国後1年以内（在留期限が先に来る場合はその日まで）に戻るなら、出国時の手続きで再入国許可は原則不要です。特別永住者は2年。1年を超えるなら事前に再入国許可が必要。",source:"入管法26条の2（みなし再入国許可）"},
{id:"imm013",subject:"入管法",question:"2026年4月15日以降の技人国の申請では、カテゴリー3・4の企業で言語を用いた対人業務に従事する場合、CEFR・B2相当（JLPT・N2など）の日本語能力を示す資料が必要になる。",correct:true,explain:"2026年4月15日以降の申請から、カテゴリー3・4かつ対人業務に言語能力を用いる場合、CEFR・B2相当の証明（JLPT・N2以上、BJT400点以上、日本の大学卒業などのみなし要件を含む）が求められます。",source:"出入国在留管理庁（技人国の日本語要件）"},
{id:"imm014",subject:"入管法",question:"在留資格の変更や在留期間の更新は、要件を形式的に満たしていれば、必ず許可される。",correct:false,explain:"変更・更新は法務大臣（出入国在留管理庁）の裁量判断で、『相当性』が総合的に審査されます。形式要件を満たしても不許可になり得ます。素行や納税・在留状況なども見られます。",source:"入管法20条・21条"},
{id:"imm015",subject:"入管法",question:"『経営・管理』は、日本で会社を経営したり、事業の管理に従事したりするための在留資格である。",correct:true,explain:"会社の経営者・役員や事業の管理者が対象です。事業所の確保や事業の継続性・安定性などが審査されます。",source:"入管法 別表第一の二（経営・管理）"},
{id:"imm016",subject:"入管法",question:"外国人が日本人と結婚すると、その時点で自動的に日本国籍を取得する。",correct:false,explain:"結婚しても国籍は自動取得しません。通常は在留資格『日本人の配偶者等』を取得します。日本国籍を得るには別途『帰化』の許可が必要です。",source:"国籍法（結婚による国籍の自動取得はない）"},
{id:"imm017",subject:"入管法",question:"育成就労制度では、一定の要件のもとで、本人の意向による転籍（別の受入れ機関への移籍）が認められる。",correct:true,explain:"転籍が原則禁止だった技能実習と異なり、育成就労では分野ごとの制限期間（1〜2年）などの要件を満たせば、本人の意向による同一分野内の転籍が認められます。",source:"育成就労法（転籍制度）"},
{id:"imm018",subject:"入管法",question:"不法就労と知りながら外国人を雇った事業主は、『不法就労助長罪』に問われる可能性がある。",correct:true,explain:"事業主も処罰対象です。在留カードでの就労可否確認を怠った場合など、『知らなかった』では免れないことがあります。採用時の在留資格・就労可否の確認が重要です。",source:"入管法73条の2（不法就労助長）"},
{id:"imm019",subject:"入管法",question:"観光目的で来日する外国人は、国籍にかかわらず全員、事前に査証（ビザ）を取得しなければ入国できない。",correct:false,explain:"日本と査証免除の取決めがある国・地域の国籍者は、短期滞在について事前のビザなしで入国できます（滞在可能日数は取決めによる）。免除対象外の国籍者はビザが必要です。",source:"査証免除措置（短期滞在）"},
{id:"imm020",subject:"入管法",question:"特定技能の在留資格を得るには、原則として、技能試験と日本語試験に合格すること（または技能実習2号を良好に修了していること）が必要である。",correct:true,explain:"特定技能は『即戦力』が前提で、分野ごとの技能試験＋日本語試験の合格が原則。技能実習2号を良好に修了し業務の関連性がある場合は試験免除ルートもあります。",source:"入管法 別表第一の二（特定技能）・分野別運用方針"},
{id:"con001",subject:"建設業許可",question:"請負代金500万円未満（建築一式工事を除く・税込）の工事は『軽微な建設工事』にあたり、建設業許可がなくても請け負える。",correct:true,explain:"建築一式以外は税込500万円未満なら許可不要（軽微な建設工事）。ただし500万円ちょうどは『未満』でないため許可が必要になります。",source:"建設業法3条・施行令1条の2"},
{id:"con002",subject:"建設業許可",question:"建築一式工事は、請負代金1,500万円未満（税込）の工事、または延べ面積150㎡未満の木造住宅工事であれば、許可がなくても請け負える。",correct:true,explain:"建築一式工事は基準が異なり、1,500万円未満（税込）または延べ面積150㎡未満の木造住宅なら軽微な工事として許可不要です。",source:"建設業法施行令1条の2"},
{id:"con003",subject:"建設業許可",question:"税抜490万円の工事は、消費税を加えても500万円未満なので、必ず軽微な工事として許可は不要である。",correct:false,explain:"税抜490万円は消費税10%を加えると539万円となり、税込500万円以上なので許可が必要です。軽微かどうかは必ず『税込』で判断します。",source:"建設業法施行令1条の2（税込で判断）"},
{id:"con004",subject:"建設業許可",question:"一つの工事をわざと複数の契約に分ければ、それぞれ500万円未満にして、許可なしで請け負うことができる。",correct:false,explain:"正当な理由のない分割は、各契約を合算して判断します。許可逃れの分割は建設業法違反で罰則の対象。材料と工事を分けて契約する手法も認められません。",source:"建設業許可事務ガイドライン（第3条関係）"},
{id:"con005",subject:"建設業許可",question:"軽微な工事に当たるかどうかの金額は、消費税を含めた金額で判断する。",correct:true,explain:"請負代金は税込で判断します。さらに注文者支給材がある場合はその市場価格等も加えて計算する点に注意が必要です。",source:"建設業法施行令1条の2"},
{id:"con006",subject:"建設業許可",question:"注文者が材料を無償で支給する場合、その材料費は請負代金に含めず、工賃だけで500万円未満かを判断すればよい。",correct:false,explain:"注文者が材料を提供する場合は、その市場価格（＋運送費）を請負代金に加えて判断します。工賃が少額でも材料費が高いと許可が必要になることがあります。",source:"建設業法施行令1条の2第3項"},
{id:"con007",subject:"建設業許可",question:"建設業の許可は、営業所の所在地に応じて『国土交通大臣許可』か『都道府県知事許可』かに分かれる。",correct:true,explain:"2つ以上の都道府県に営業所を設ける場合は大臣許可、1つの都道府県内だけに営業所を置く場合は知事許可です。区分は『営業所の所在』で決まります。",source:"建設業法3条"},
{id:"con008",subject:"建設業許可",question:"『知事許可』の業者は、許可を受けた都道府県以外にある工事現場で工事を施工することはできない。",correct:false,explain:"できます。大臣許可・知事許可の区分は営業所の所在で決まるもので、工事を施工できる地域を制限するものではありません。知事許可でも全国の現場で施工可能です。",source:"建設業法3条（許可区分は営業所基準）"},
{id:"con009",subject:"建設業許可",question:"建設業許可は一度取得すれば、更新の手続きをしなくてもずっと有効である。",correct:false,explain:"建設業許可の有効期間は5年で、引き続き営業するには期間満了前に更新が必要です。更新を忘れると許可は失効します。",source:"建設業法3条3項（有効期間5年）"},
{id:"con010",subject:"建設業許可",question:"建設業許可を取得するには、『経営業務の管理責任者（経管）』となれる人を置く必要がある。",correct:true,explain:"経営を適正に行う能力の要件として、常勤役員等（個人は本人・支配人）に一定の経営経験が必要です。許可後に不在になると取消し等の対象になります。",source:"建設業法7条1号（経営業務の管理責任者等）"},
{id:"con011",subject:"建設業許可",question:"建設業許可を受けるには、各営業所に、その業種について一定の資格や実務経験を持つ専任技術者（営業所技術者）を置く必要がある。",correct:true,explain:"営業所ごとに、許可を受ける業種について有資格者または所定の実務経験者を専任で配置する必要があります（令和6年の改正で『営業所技術者』へ名称変更）。",source:"建設業法7条2号（営業所技術者等）"},
{id:"con012",subject:"建設業許可",question:"令和2年（2020年）10月の改正により、経営業務の管理責任者の経営経験は、必ずしも『許可を受けようとする業種』での経験でなくてもよくなった。",correct:true,explain:"改正で『業種しばり』が撤廃され、建設業に関する経営経験であれば業種を問わず5年以上でOKになりました。加えて『常勤役員等＋直接補佐者』ルートも新設されています。",source:"建設業法施行規則7条（令和2年10月改正）"},
{id:"con013",subject:"建設業許可",question:"建設業許可の業種は全部で29業種に区分されており、営業しようとする業種ごとに許可が必要である。",correct:true,explain:"土木一式・建築一式のほか、とび土工、電気、管、内装仕上、解体などを含む29業種に分かれ、営む業種ごとに許可が必要です（解体工事業は平成28年に追加）。",source:"建設業法別表第一（29業種）"},
{id:"con014",subject:"建設業許可",question:"発注者から直接請け負った工事で、下請に出す代金の総額が一定額以上になる場合は、『特定建設業』の許可が必要になる。",correct:true,explain:"元請として下請に出す総額が基準以上になる場合は特定建設業許可が必要です。自社施工中心で下請総額が基準未満なら、一般建設業許可で足ります。",source:"建設業法3条（一般・特定の区分）"},
{id:"con015",subject:"建設業許可",question:"特定建設業が必要となる下請代金の総額の基準は、令和7年（2025年）2月1日から引き上げられ、建築一式は8,000万円以上、それ以外は5,000万円以上となった。",correct:true,explain:"令和7年2月1日の改正で、建築一式は7,000万円→8,000万円、それ以外は4,500万円→5,000万円に引き上げられました。この総額を超えて下請に出す元請は特定建設業許可が必要です。",source:"建設業法施行令2条（令和7年2月改正）"},
{id:"con016",subject:"建設業許可",question:"許可を受けずに、軽微な工事に当たらない建設工事を請け負って営業すると、建設業法違反として罰則の対象になる。",correct:true,explain:"無許可営業は3年以下の懲役または300万円以下の罰金の対象です。さらに違反すると一定期間（5年間）許可を受けられなくなるなどの不利益もあります。",source:"建設業法47条（罰則）"},
{id:"con017",subject:"建設業許可",question:"建設業許可を受けた業者は、毎事業年度の終了後、決算の内容などを届け出る『決算変更届（事業年度終了届）』を提出する必要がある。",correct:true,explain:"毎事業年度終了後、原則4か月以内に決算変更届の提出が必要です。提出を怠ると更新ができない・指導の対象になるなどの不利益があります。",source:"建設業法11条2項（変更届出）"},
{id:"con018",subject:"建設業許可",question:"建設業許可を受けるには、健康保険・厚生年金・雇用保険などの社会保険に適切に加入していることが要件となっている。",correct:true,explain:"適用事業所に該当する営業所について、社会保険（健保・厚年・雇用）への加入が許可要件です。未加入だと許可を受けられません。",source:"建設業法施行規則（社会保険加入要件）"},
{id:"con019",subject:"建設業許可",question:"解体工事だけを行う場合、軽微な工事であれば、建設業許可も他のどんな登録も一切必要ない。",correct:false,explain:"軽微な工事でも、解体工事を行うには建設リサイクル法に基づく『解体工事業の登録』が必要です（建設業許可で解体工事業を取得している場合は登録不要）。",source:"建設リサイクル法（解体工事業の登録）"},
{id:"con020",subject:"建設業許可",question:"同じ営業所で要件を満たせば、一人の人物が『経営業務の管理責任者』と『専任技術者（営業所技術者）』を兼ねることができる。",correct:true,explain:"両方の要件を満たし、同一営業所に常勤していれば1人で兼任できます。個人事業主や一人法人で、代表者本人が両方を兼ねるケースが典型です。",source:"建設業許可事務ガイドライン（兼務の取扱い）"},
{id:"tor001",subject:"申請取次",question:"入管法は、外国人の出入国の管理だけではなく、日本人の出入国についても対象としている。",correct:true,explain:"入管法1条は「全ての人の出入国」と本邦に在留する全ての外国人の在留の公正な管理を目的としており、60条が日本人の出国の確認、61条が日本人の帰国の確認を規定しています。入管法＝外国人だけの法律、と思い込まないことがポイントです。",source:"入管法1条・60条・61条"},
{id:"tor002",subject:"申請取次",question:"日本の国籍と外国の国籍を保有する重国籍者は、入管法上「外国人」となる。",correct:false,explain:"入管法上の「外国人」とは日本の国籍を有しない者と定義されています（入管法2条1号）。日本国籍を持っていれば、外国籍を併有していても「外国人」にはなりません。重国籍者の相談を受けたときに前提を誤らないよう注意しましょう。",source:"入管法2条1号・国籍法11条"},
{id:"tor003",subject:"申請取次",question:"すべての外国人は、本邦にて在留資格「短期滞在」に該当する活動を行う場合においては、旅券に査証の発給を受けている必要はない。",correct:false,explain:"短期滞在の活動であっても、原則として査証は必要です。国際的約束や日本政府の通告により査証を要しないとされている国・地域（査証免除措置）の旅券である場合に限り不要になります（入管法6条）。「観光ならビザ不要」と一般化して説明しないよう注意が必要です。",source:"入管法6条"},
{id:"tor004",subject:"申請取次",question:"本邦に上陸しようとする外国人（乗員を除く）は原則として有効な旅券で日本国領事官等の査証を受けたものを所持しなければならないが、再入国の許可（みなし再入国許可を含む）を受けている者は、上陸にあたり旅券に査証を受けておく必要はない。",correct:true,explain:"有効な旅券＋査証の所持が原則ですが（入管法6条1項）、査証免除国・地域の旅券や、再入国許可（みなし再入国許可を含む）を受けている者の旅券には査証は不要です。再入国許可を持つ在留中の外国人が一時帰国する場面で実務上よく出てくる知識です。",source:"入管法6条・26条・26条の2"},
{id:"tor005",subject:"申請取次",question:"高度専門職省令のポイント計算で70点以上を有する者は、「高度人材外国人」として1年以上継続して70点以上を有して本邦に在留していれば、在留歴に係る永住許可要件の緩和の優遇を受けることができる。",correct:false,explain:"70点以上の高度人材外国人の場合は「3年以上」継続して70点以上を有して在留していることが必要です。1年で足りるのは80点以上の場合です。70点＝3年、80点＝1年という組合せを正確に覚えることが重要です。",source:"永住許可に関するガイドライン（原則10年在留の特例）"},
{id:"tor006",subject:"申請取次",question:"高度専門職省令のポイント計算で80点以上を有する者で1年以上継続して80点以上を有して本邦に在留している者は、永住許可申請日から1年前の時点でも80点以上を有していたと認められる場合、在留歴に係る永住許可要件の緩和の優遇を受けることができる。",correct:true,explain:"80点以上の高度人材外国人は、申請日から1年前の時点で80点以上を有し、1年以上継続して80点以上で在留していれば、原則10年在留の特例を受けられます。申請時だけでなく「1年前の時点」でも点数を満たしていた立証が必要な点が実務上のポイントです。",source:"永住許可に関するガイドライン（原則10年在留の特例）"},
{id:"tor007",subject:"申請取次",question:"「高度専門職1号ロ」でA社の業務に従事していた者がB社に転職して同種の業務に従事する場合（転職後も要件は満たすものとする）、「高度専門職1号ロ」から「高度専門職1号ロ」への在留資格変更許可申請が必要となる。",correct:true,explain:"高度専門職1号は「法務大臣が指定する本邦の公私の機関」との契約に基づく活動であり、指定書に機関名が記載されます。転職は指定機関の変更に当たるため、同じ1号ロ同士でも在留資格変更許可申請が必要です（入管法20条1項）。技人国の転職（届出のみ）との違いが実務の落とし穴です。",source:"入管法20条1項・別表第1の2"},
{id:"tor008",subject:"申請取次",question:"「経営・管理」の事業所要件は、日本標準産業分類の「事業所」の定義（一定の場所を占めること、人及び施設を有して継続的に行われること）を満たすだけでは足りず、事業の継続的な運営が求められるため、月単位の短期間賃貸スペースや容易に処分可能な屋台等を利用する場合は基準省令に適合しない。",correct:true,explain:"経営・管理では事業の継続性が求められるため、短期賃貸スペースや屋台等では事業所要件を満たしません。実務では、賃貸借契約の使用目的を事業用（店舗・事務所等）とし、契約名義を法人にして法人使用であることを明確にすることが必要です。",source:"上陸基準省令（経営・管理）・「外国人経営者の在留資格基準の明確化について」"},
{id:"tor009",subject:"申請取次",question:"「経営・管理」の事業規模要件は、経営・管理従事者以外に本邦に居住する常勤職員が従事して営まれるものでなくても、資本金の額又は出資の総額が500万円以上であれば満たすことになる。",correct:false,explain:"現行の上陸基準省令では、①常勤職員（別表第1の在留資格者を除く）1人以上が従事して営まれること、②事業の用に供される財産の総額（資本金・出資の総額を含む）が3,000万円以上であることの「両方」が必要です。「資本金500万円でOK」は改正前の古い知識なので、お客様への説明時に特に注意が必要です。",source:"上陸基準省令（経営・管理2号イ・ロ）"},
{id:"tor010",subject:"申請取次",question:"「経営・管理」の事業規模要件について、資本金500万円以上でなくても本邦に居住する2人以上の常勤職員が従事して営まれるものであれば満たすことになり、その常勤職員の在留資格が「技術・人文知識・国際業務」であってもよい。",correct:false,explain:"常勤職員の要件は「別表第1の在留資格をもって在留する者を除く」とされており、技人国の職員はカウントできません（日本人、永住者等の別表第2の在留資格者などが対象）。また現行基準は常勤職員1人以上の雇用に加えて財産総額3,000万円以上が必須であり、職員がいれば資金要件が免除される仕組みではありません。",source:"上陸基準省令（経営・管理2号イ・ロ）"},
{id:"tor011",subject:"申請取次",question:"「経営・管理」の上陸許可基準を満たすためには、申請人が事業の経営に従事しようとする場合、事業の経営について3年以上の経験（大学院において経営に係る科目を専攻した期間を含む）を有していることが必要である。",correct:false,explain:"3年以上の経営・管理の経験（基準ロ）がなくても、経営管理に関する分野又は事業に必要な技術・知識の分野における博士・修士・専門職学位（基準イ）を有していれば足ります。イ・ロのいずれかを満たせばよく、経験が必須ではありません。学位ルートの存在を見落とさないようにしましょう。",source:"上陸基準省令（経営・管理4号イ・ロ）"},
{id:"tor012",subject:"申請取次",question:"「高度専門職」「研究」「技術・人文知識・国際業務」「技能」の在留資格において、「契約」には雇用契約のほか委任契約、請負契約なども含まれるが、特定の機関（複数でもよい）との継続的なものでなければならない。",correct:true,explain:"審査要領のとおり、契約は雇用に限らず委任・請負等も含みますが、特定の機関との継続的なものであることが必要です。フリーランス的な働き方の相談では、この「特定性・継続性」を満たすかが実務上の判断ポイントになります。",source:"入国・在留審査要領第12編"},
{id:"tor013",subject:"申請取次",question:"外国企業の日本駐在員事務所は、在留資格「技術・人文知識・国際業務」の「本邦の公私の機関」に該当しない。",correct:false,explain:"「本邦の公私の機関」には、国・地方公共団体・会社等の法人のほか、任意団体、本邦に事務所等を有する外国の国・外国法人、さらに本邦に事務所等を有する個人も含まれます。外国企業の日本駐在員事務所も該当すると考えられます。",source:"入国・在留審査要領第12編"},
{id:"tor014",subject:"申請取次",question:"アメリカ企業Aの従業員甲が、その子会社である日本企業Bに派遣され、企業Aとの労働契約に基づき企業Bにて海外取引業務に従事するときは、在留資格「技術・人文知識・国際業務」に該当する可能性がある。",correct:false,explain:"外国の契約のままで足りる（新たな契約が不要となる）のは「同一法人」の外国事業所から本邦事業所への転勤の場合に限られます。親会社Aと子会社Bは別法人なので、A社との契約だけでは「本邦の公私の機関との契約」があるとは認められず、技人国は不可です。この事例は「企業内転勤」を検討する場面です。",source:"入国・在留審査要領第12編"},
{id:"tor015",subject:"申請取次",question:"アメリカ企業Aの従業員甲が、その日本支店Cに転勤し、企業Aとの労働契約に基づき支店Cにおいて海外取引業務に従事するときは、在留資格「企業内転勤」に該当する可能性がある。",correct:true,explain:"本店から日本支店への転勤は同一法人内の異動であり、企業内転勤の典型例です。同一法人内の転勤では、外国で締結済みの雇用契約が「本邦の公私の機関との契約」に当たるため、日本側で新たな契約を締結する必要はありません。",source:"入国・在留審査要領第12編・上陸基準省令（企業内転勤）"},
{id:"tor016",subject:"申請取次",question:"大学で室内装飾に係るデザインを専攻して卒業した者が室内装飾デザインの業務に従事する場合は、「外国の文化に基盤を有する思考若しくは感受性を必要とする業務」（国際業務）として在留資格該当性を有することになる。",correct:false,explain:"翻訳・通訳・デザイン等の国際業務類型の業務であっても、大学等でその業務に必要な科目を専攻して卒業した者の場合は、基準1号（技術・人文知識の類型）が適用されます。国際業務（基準2号）の実務経験3年ルートで考える必要はありません。どの基準が適用されるかで立証すべき内容が変わる点が実務上重要です。",source:"入国・在留審査要領第12編第15節・上陸基準省令（技人国）"},
{id:"tor017",subject:"申請取次",question:"アメリカ企業に1年以上通訳・翻訳業務で勤務する従業員が、そのアメリカ企業の日本子会社に期間を定めて転勤し、転勤期間中は通訳・翻訳業務に従事する場合、在留資格「企業内転勤」に該当する。",correct:true,explain:"転勤直前に外国の事業所で技人国の業務（通訳・翻訳）に1年以上継続して従事しているため、企業内転勤の基準を満たします。系列企業（親会社→子会社）への転勤も対象です。なお、1年に満たない場合でも技人国の基準に適合すれば技人国での入国が可能です。",source:"上陸基準省令（企業内転勤1号）・入国・在留審査要領第12編"},
{id:"tor018",subject:"申請取次",question:"会計学を専攻して大学を卒業した者が、主に会計知識に基づいて会計処理プログラムの開発に従事するエンジニアとして活動する場合は、「理学、工学その他の自然科学の分野」（技術）であり、人文知識分野の業務としての在留資格該当性を有することにはならない。",correct:false,explain:"在留資格該当性は「エンジニア」という肩書ではなく活動内容で判断します。会計学の知識に基づく会計処理プログラム開発であれば、人文科学（経済学等）の分野に属する知識を要する業務として該当しえます。職種名だけで技術／人文知識を機械的に振り分けないことが審査対応のコツです。",source:"入管法別表第1の2（技人国）"},
{id:"tor019",subject:"申請取次",question:"「技術・人文知識・国際業務」の上陸許可基準における『従事しようとする業務と専攻科目との関連性』は、大学を卒業した者についても、専修学校の専門課程を卒業した者と同様に必要である。",correct:false,explain:"大学は広く知識を授け専門の学芸を教授研究する機関である（学校教育法83条）ことから、大卒者については専攻との関連性は柔軟に判断されます。一方、専修学校卒業者の案件では、大卒者よりも具体的に業務と専攻科目の関連性を立証することが求められます。専門学校卒の案件を受任する際は立証資料を厚めに準備しましょう。",source:"入国・在留審査要領第12編第15節・学校教育法83条"},
{id:"tor020",subject:"申請取次",question:"「技術・人文知識・国際業務」では、自然科学・人文科学の分野の業務に従事する場合であれ、外国の文化に基盤を有する業務に従事する場合であれ、日本人が従事する場合に受ける報酬と同等額以上の報酬を受けることが必要である。",correct:true,explain:"報酬要件（基準3号）はどちらの類型にも共通して適用されます。「日本人と同等額以上」は一律の金額基準ではなく、その企業の賃金体系や他企業の同種職種の賃金を参考に判断されます。雇用主への説明時は、日本人社員との賃金バランスを確認することが実務上のポイントです。",source:"上陸基準省令（技人国3号）・入国・在留審査要領第12編"},
{id:"tor021",subject:"申請取次",question:"「技術・人文知識・国際業務」の上陸許可基準では、必要な技術・知識に関連する科目を専攻して大学を卒業していなくても、関連する科目を専攻して本邦の専修学校の専門課程を修了（法務大臣が告示で定める要件に該当する場合に限る）していれば足りる。",correct:true,explain:"学歴要件は、大学卒業（基準1号イ）のほか、本邦の専修学校の専門課程修了（基準1号ロ、告示要件あり＝専門士等）でも満たせます。専門学校ルートの場合は「本邦の」専修学校に限られる点と、業務との関連性がより厳格に見られる点に注意しましょう。",source:"上陸基準省令（技人国1号ロ）"},
{id:"tor022",subject:"申請取次",question:"「技術・人文知識・国際業務」の上陸許可基準では、必要な技術・知識に関連する科目を専攻して大学を卒業していなくても、従事しようとする業務に関連する業務について10年以上の実務経験を有していれば足りる。",correct:true,explain:"基準1号ハにより、10年以上の実務経験（関連科目を専攻した就学期間を含む）でも学歴要件に代えられます。国際業務類型（基準2号）の「3年」と、この技術・人文知識類型の「10年」を混同しないことが試験でも実務でも重要です。",source:"上陸基準省令（技人国1号ハ）"},
{id:"tor023",subject:"申請取次",question:"外国の文化に基盤を有する思考又は感受性を必要とする業務に従事する場合は、原則として関連業務について3年以上の実務経験が必要であり、大学を卒業した者が翻訳、通訳又は語学の指導に係る業務に従事するときもこれを満たさなければならない。",correct:false,explain:"国際業務類型では原則3年以上の実務経験が必要ですが、大学を卒業した者が「翻訳・通訳・語学の指導」に従事する場合はただし書により実務経験不要です（基準2号ロただし書）。留学生の新卒採用で通訳翻訳業務に就くケースはこの例外で処理される典型例です。",source:"上陸基準省令（技人国2号ロただし書）"},
{id:"tor024",subject:"申請取次",question:"海外の親会社から日本の子会社に転勤し「企業内転勤」の在留資格で在留する場合、海外の親会社から給与の支払いを受けることはできない。",correct:false,explain:"企業内転勤では、日本の受入れ企業から給与を受けるケース（転籍型）も、海外の派遣元に在籍したまま海外から給与を受けるケース（在籍出向型）も可能です。給与の支払元が海外であること自体は問題になりませんが、報酬要件（日本人と同等額以上）の立証方法は工夫が必要です。",source:"入管法別表第1の2・上陸基準省令（企業内転勤）"},
{id:"tor025",subject:"申請取次",question:"海外本店から支店登記されていない日本駐在員事務所への転勤は、同一会社内の転勤であるが、「企業内転勤」の対象とならない。",correct:false,explain:"駐在員事務所は「その他の事業所」に当たるため、支店として登記されていなくても企業内転勤の対象になります。登記の有無で判断しない点が誤解されやすいポイントです。",source:"入管法別表第1の2（企業内転勤）・入国・在留審査要領第12編"},
{id:"tor026",subject:"申請取次",question:"海外親会社から日本子会社への転勤は、同一会社内の転勤ではないが、在留資格「企業内転勤」の対象となる。",correct:true,explain:"審査要領により、系列企業内（財務諸表等規則8条の「親会社」「子会社」「関連会社」）の転勤・出向も企業内転勤の対象とされています。同一法人内の異動に限られない点を押さえましょう。",source:"入国・在留審査要領第12編・財務諸表等規則8条"},
{id:"tor027",subject:"申請取次",question:"海外企業A社は日本企業B社の株主総会における議決権を25%保有している。この場合、A社からB社への転勤は「企業内転勤」の対象となる。",correct:true,explain:"議決権の20%以上を実質的に保有する等の場合、財務諸表等規則8条の「関連会社」に該当し、系列企業内の転勤として企業内転勤の対象になります。資本関係が薄い会社間の「転勤」の相談では、まず持株・議決権比率の確認が実務の入口になります。",source:"入国・在留審査要領第12編・財務諸表等規則8条"},
{id:"tor028",subject:"申請取次",question:"外国に特有の建築又は土木に係る技能について10年以上の実務経験を有する者で、当該技能を要する業務に従事し、かつ日本人と同等額以上の報酬を受ける者は、在留資格「技能」の上陸許可基準に適合しない。",correct:false,explain:"外国に特有の建築・土木に係る技能は、基準省令に列挙された「技能」の対象業務であり、10年以上の実務経験と報酬要件を満たせば基準に適合します。「技能」は基準省令で対象業務が限定列挙されている点が特徴で、列挙外の業務は熟練技能でも対象外です。",source:"上陸基準省令（技能）"},
{id:"tor029",subject:"申請取次",question:"宝石、貴金属又は毛皮の加工に係る技能について10年以上の実務経験を有する者で、当該技能を要する業務に従事し、かつ日本人と同等額以上の報酬を受ける者は、在留資格「技能」の上陸許可基準に適合する。",correct:true,explain:"宝石・貴金属・毛皮の加工も基準省令に列挙された「技能」の対象業務であり、10年以上の実務経験と報酬要件を満たせば適合します。外国料理の調理師（いわゆるコック）以外にも列挙業務がある点を押さえておきましょう。",source:"上陸基準省令（技能）"},
{id:"tor030",subject:"申請取次",question:"「研究」の在留資格をもって在留する者の扶養を受ける認知された非嫡出子として行う日常的な活動は、在留資格「家族滞在」に該当する。",correct:true,explain:"家族滞在の「子」には、嫡出子のほか養子及び認知された非嫡出子が含まれ、成年に達した者も含まれます。「子＝未成年の実子」と狭く考えないことがポイントです（ただし扶養を受けていることは必要です）。",source:"入管法別表第1の4・入国・在留審査要領第12編"},
{id:"tor031",subject:"申請取次",question:"「技能」の在留資格をもって在留する者の扶養を受ける配偶者として行う日常的な活動は、在留資格「家族滞在」に該当しない。",correct:false,explain:"「技能」は家族滞在の扶養者となれる在留資格であり、その扶養を受ける配偶者・子の日常的な活動は家族滞在に該当します。家族滞在の扶養者になれない在留資格（短期滞在、技能実習、特定技能1号など）と対比して覚えると整理しやすいです。",source:"入管法別表第1の4"},
{id:"tor032",subject:"申請取次",question:"「特定活動（日本人甲と同居しその扶養を受ける活動）」の指定を受けて在留する甲の母親が、今後は甲の弟である乙と同居しその扶養を受けることにした場合、「特定活動」から「特定活動」への在留資格変更許可申請は必要ない。",correct:false,explain:"特定活動では、法務大臣が個々に指定する活動（指定書の内容）の変更も在留資格の変更に含まれます（入管法20条1項）。扶養者が甲から乙に変わると指定書の変更が必要になるため、特定活動から特定活動への在留資格変更許可申請が必要です。高度専門職の転職と同じく「同じ在留資格でも変更申請が要る」パターンです。",source:"入管法20条1項"},
{id:"tor033",subject:"申請取次",question:"日本人の子として出生した者である場合、親である日本人の扶養を受けない場合でも、在留資格「日本人の配偶者等」に該当する。",correct:true,explain:"「日本人の配偶者等」は、「家族滞在」と異なり扶養関係が要件とされていません。日本人の子として出生した事実があれば、成人して独立生計を営んでいても該当します。別表第2の身分系在留資格には活動制限も扶養要件もない、という整理で覚えましょう。",source:"入管法別表第2"},
{id:"tor034",subject:"申請取次",question:"日本人の子として出生した者は本邦外で出生しても「日本人の配偶者等」に該当するが、「永住者」の子として出生した者は、本邦外で出生したときは「永住者の配偶者等」には該当しない。",correct:true,explain:"「永住者の配偶者等」のうち「子」の類型は、本邦で出生しその後引き続き本邦に在留している者に限られます。本邦外で出生した永住者の子は、永住者の扶養を受ける未成年・未婚の実子として「定住者」（定住者告示6号イ）に該当しえます。日本人の子（出生地不問）との違いが頻出論点です。",source:"入管法別表第2・定住者告示6号イ"},
{id:"tor035",subject:"申請取次",question:"外国人Aの父が日本国籍を取得した場合、Aがその父の未成年かつ未婚の実子であって、その父の扶養を受けて生活するときは、在留資格「定住者」に該当する。",correct:true,explain:"出生の時点で親が日本国籍を有していた場合は「日本人の配偶者等」ですが、出生後に親が帰化等で日本国籍を取得した場合は、未成年・未婚で扶養を受ける実子として「定住者」に該当します。「出生時点の親の国籍」で振り分けるのが判断の軸です。",source:"入管法別表第2・定住者告示"},
{id:"tor036",subject:"申請取次",question:"「日本人の配偶者等」の在留資格をもって在留する者で、日本人の子として出生したものの配偶者は、「定住者」告示に該当しない。",correct:false,explain:"定住者告示5号イにより、日本人の子として出生した「日本人の配偶者等」在留者の配偶者は定住者告示に該当します。配偶者の連鎖（日配の子の配偶者など）は告示5号系で処理される、と整理しておくと迷いにくくなります。",source:"定住者告示5号イ"},
{id:"tor037",subject:"申請取次",question:"1年以上の在留期間を指定されている「定住者」の在留資格をもって在留する者の扶養を受けて生活する、この者の6歳未満の養子は、「定住者」に該当する。",correct:true,explain:"定住者告示7号ハに該当します。養子が定住者告示の対象になるのは「6歳未満」の場合である点が数字の引っかけポイントとしてよく出題されます。",source:"定住者告示7号ハ"},
{id:"tor038",subject:"申請取次",question:"判例によれば、婚姻破綻の原因が日本人配偶者にあったとしても、婚姻関係が社会生活上の実質的基礎を失っている場合は、未だ法的に離婚が成立していないときでも、外国人配偶者の活動は在留資格「日本人の配偶者等」に該当しなくなる。",correct:true,explain:"最高裁平成14年10月17日判決は、婚姻関係が法律上存続していても、双方が婚姻意思を確定的に喪失し共同生活の実体を欠き回復の見込みがない場合には、日配としての活動に該当しないとしています。破綻の原因がどちらにあるかは問われない点に注意が必要です。別居中の日配在留者からの更新相談では、婚姻の実体の有無を慎重に確認しましょう。",source:"最判平成14年10月17日"},
{id:"tor039",subject:"申請取次",question:"「日本人の配偶者等」で在留していた者の日本人配偶者が交通事故により死亡した場合、当該外国人は日本人の配偶者としての地位を失うが、死別を理由に「日本人の配偶者等」の在留資格を直ちに取り消されることはない。",correct:true,explain:"死別により在留資格該当性は失われますが、取消しがされるまでは在留期間満了日まで適法に在留できます。取消事由は「配偶者の身分を有する者としての活動を継続して6月以上行わないで在留していること」（入管法22条の4第1項7号）であり、死別自体で直ちに取り消されるわけではありません。この間に定住者等への変更を検討するのが実務の流れです。",source:"入管法22条の4第1項7号"},
{id:"tor040",subject:"申請取次",question:"日本国又は日本国以外の国の法令に違反して1年以上の拘禁刑又はこれに相当する刑に処せられたことのある者であっても、執行猶予の言渡しを受けた者は「上陸拒否事由」に該当する外国人とはならない。",correct:false,explain:"入管法5条1項4号により、1年以上の拘禁刑等に処せられた者は、執行猶予付きであっても無期限の上陸拒否事由に該当します。「執行猶予なら大丈夫」という誤解はお客様に多いので、明確に否定できるようにしておきましょう。",source:"入管法5条1項4号"},
{id:"tor041",subject:"申請取次",question:"外国において覚せい剤の所持・使用で罰せられ刑に処せられた者は、本邦の覚せい剤取締りに関する法律により刑に処せられていなくても、「上陸拒否事由」に該当する外国人となる。",correct:true,explain:"入管法5条1項5号は「日本国又は日本国以外の国の法令に違反して」薬物関係の罪により刑に処せられた者を上陸拒否事由としています。外国での処罰歴も対象になる点がポイントです。薬物事犯は刑の軽重を問わず無期限の上陸拒否となる厳しい類型です。",source:"入管法5条1項5号"},
{id:"tor042",subject:"申請取次",question:"入管法5条の「上陸拒否事由」に該当する外国人は、法務大臣による上陸特別許可（入管法12条）によらず、入国審査官による上陸許可では上陸できない。",correct:false,explain:"入管法5条の2（上陸拒否の特例）により、5条1項4号・5号・7号・9号・9号の2に該当する場合でも、再入国許可を得ているとき等は入国審査官の上陸許可で上陸できます。特例の適用が相当と認められた者には地方局長から通知書が交付され、上陸申請時に携行します。上陸特別許可だけが救済ルートではない点を押さえましょう。",source:"入管法5条の2・12条・施行規則4条の2"},
{id:"tor043",subject:"申請取次",question:"入管法7条1項の「上陸のための条件」は、①有効な旅券・査証の所持、②申請に係る活動が偽りのものでないこと、③行おうとする活動の在留資格該当性・上陸許可基準適合性、④滞在予定期間が在留期間を定めた施行規則の規定に適合すること、の4つである。",correct:false,explain:"7条1項の条件は、①旅券・査証の有効性、②活動の真実性・在留資格該当性・基準適合性、③在留期間の適合性、④上陸拒否事由に該当しないこと、の4つです。問題文は4号の「上陸拒否事由非該当」が抜けている点が誤りです。4条件をセットで正確に言えるようにしておきましょう。",source:"入管法7条1項1〜4号"},
{id:"tor044",subject:"申請取次",question:"「短期滞在」の在留資格が決定された者には在留カードが交付されない。",correct:true,explain:"入管法19条の3により、①3月以下の在留期間が決定された者、②短期滞在、③外交・公用、④これらに準ずる者は「中長期在留者」から除かれ、在留カードの交付対象外です。この4類型は在留カード関連の頻出知識です。",source:"入管法19条の3"},
{id:"tor045",subject:"申請取次",question:"「特別永住者」には在留カードが交付されない。",correct:true,explain:"特別永住者には在留カードではなく「特別永住者証明書」が交付されます（入管特例法7条）。特別永住者は入管特例法で別建ての制度になっている、という枠組みを意識すると整理しやすいです。",source:"入管特例法7条"},
{id:"tor046",subject:"申請取次",question:"中長期在留者が住居地を変更した場合、その変更後14日以内に地方出入国在留管理局にて変更届出を行わなければならない。",correct:false,explain:"住居地の変更届出は出入国在留管理庁長官に対して行いますが、「市町村の長を経由して」届け出るため、窓口は新住居地の市区町村役場です（入管法19条の9第1項）。市区町村への転入届・転居届をすれば住居地の届出がされたものとみなされます（同条3項）。「住居地だけは市役所、他の届出は入管」という窓口の違いが引っかけどころです。",source:"入管法19条の9"},
{id:"tor047",subject:"申請取次",question:"在留資格認定証明書の交付申請において、在留資格「技能」を希望する外国人と雇用契約を結んだ本邦の機関（レストランの経営会社など）の職員は、その申請の代理人として規定されていない。",correct:false,explain:"在留資格認定証明書交付申請は「当該外国人を受け入れようとする機関の職員」等を代理人として行うことができます（入管法7条の2第2項）。本人は通常外国にいるため、受入れ機関職員による代理申請が制度上予定されています。",source:"入管法7条の2第2項・施行規則6条の2・別表第4"},
{id:"tor048",subject:"申請取次",question:"在留資格認定証明書の交付申請において、所属する行政書士会を経由して地方出入国在留管理局長に届け出た行政書士は、申請の代理人として規定されている。",correct:false,explain:"届出行政書士（申請取次行政書士）は、外国人等に代わって申請書等の「提出」を行う申請取次者であり、申請人でも申請代理人でもありません。代理人（受入れ機関職員等）と取次者（届出行政書士等）の法的地位の違いは、申請取次研修の最重要論点の一つです。",source:"入管法7条の2・施行規則6条の2第4項2号"},
{id:"tor049",subject:"申請取次",question:"在留資格変更許可及び在留期間更新許可は法務大臣の羈束行為ではないため、地方出入国在留管理局が求める提出資料を添付した申請が受け付けられても、必ず許可されるとは限らない。",correct:true,explain:"在留資格変更・在留期間更新の許否は法務大臣の広範な裁量に委ねられており（マクリーン事件・最大判昭和53年10月4日）、羈束行為ではありません。「書類を全部出せば必ず許可される」わけではないことを、受任時にお客様へ正確に説明することが重要です。",source:"入管法20条・21条・最大判昭和53年10月4日（マクリーン事件）"},
{id:"tor050",subject:"申請取次",question:"在留資格変更許可申請、在留期間更新許可申請などの在留審査手続及び帰化許可申請の申請窓口は、地方出入国在留管理局、支局又は分担する出張所である。",correct:false,explain:"在留審査手続の窓口は原則として申請人の住居地を管轄する地方出入国在留管理局・支局・出張所ですが、帰化許可申請の窓口は国籍事務を扱う法務局・地方法務局の本局・支局です。帰化は入管ではなく法務局、という窓口の違いを混ぜた引っかけ問題です。",source:"入国・在留審査要領第10編"},
{id:"tor051",subject:"申請取次",question:"外国人の在留関係諸申請は、原則として申請人の住居地を管轄する地方出入国在留管理局又はその支局・出張所で申請することができる。",correct:true,explain:"在留審査手続の申請は、原則として申請人の住居地を管轄する官署で行います（取次申請も同じ）。なお現在は、取次制度の活用促進のため、受入れ機関の職員による取次であれば申請人の住居地にかかわらず当該職員の勤務地を管轄する官署でも受け付けられる例外があります。",source:"入国・在留審査要領第10編第2節"},
{id:"tor052",subject:"申請取次",question:"在留期間の満了日が地方出入国在留管理局の閉庁日にあたる場合、在留期間更新許可申請を当該閉庁日後の直近の開庁日に行えば、申請受付期間内の申請として受け付けられる。",correct:true,explain:"満了日が土日祝日・年末年始等の閉庁日である場合、直近の開庁日にした申請は期間内の申請として受け付けられます（行政機関の休日に関する法律2条）。ただし実務上は、こうしたギリギリの申請自体を避けるスケジュール管理が鉄則です。",source:"行政機関の休日に関する法律2条・入国・在留審査要領第10編"},
{id:"tor053",subject:"申請取次",question:"永住許可申請を行った者は、審査中に現在の在留資格に係る在留期間の満了日が経過する場合であっても、在留期間更新許可申請を行うことなく適法に在留を継続することができる。",correct:false,explain:"永住許可申請には、在留資格変更・在留期間更新のような「在留期間の特例」（入管法20条6項・21条4項）がありません。審査中でも、現在の在留資格の満了日までに更新申請をしなければ不法残留になってしまいます。永住申請の受任時は、既存の在留期限の管理を並行して行うことが必須です。",source:"入管法20条6項・21条4項・入国・在留審査要領第12編第27節"},
{id:"tor054",subject:"申請取次",question:"外国人Aは引き続き10年以上本邦に在留しているが、「留学」から「技術・人文知識・国際業務」に在留資格が変更されてから3年が経過していない。この場合、永住の国益要件のうち本邦在留要件（長期間にわたり我が国社会の構成員として居住していると認められること）は満たされていない。",correct:true,explain:"本邦在留要件は、引き続き10年以上の在留に加え、そのうち就労資格（技能実習・特定技能1号を除く）又は居住資格をもって「引き続き5年以上」在留していることが必要です。技人国への変更から3年しか経っていなければ就労5年の要件を満たしません。留学期間は10年にはカウントできても就労5年には入らない、という二段構えの理解が重要です。",source:"入管法22条・永住許可に関するガイドライン"},
{id:"tor055",subject:"申請取次",question:"かつて「留学」で4年間在留し、いったん帰国して6年後に再来日し「技術・人文知識・国際業務」で引き続き6年以上在留している外国人Aは、通算10年以上本邦に在留していることになるので、永住の本邦在留要件は満たされる。",correct:false,explain:"本邦在留要件は「引き続き」（継続して）10年以上の在留が必要であり、通算では足りません。帰国して在留が途切れると、それ以前の在留期間はリセットされます。長期の出国歴があるお客様の永住相談では、まず在留の継続性を確認することが実務の第一歩です。",source:"入管法22条・永住許可に関するガイドライン"},
{id:"tor056",subject:"申請取次",question:"入管法別表第1の3の表（文化活動、短期滞在）及び4の表（留学、研修、家族滞在）の在留資格をもって在留する者は、資格外活動許可を受けることなく、収入を伴う事業を運営する活動又は報酬を受ける活動を行うことができる。",correct:false,explain:"別表第1の3・4の表の在留資格者は、資格外活動許可を受けなければ収入を伴う事業運営活動・報酬を受ける活動を行えません（入管法19条1項2号）。なお「報酬」からは、業として行うものではない講演謝金や日常生活に伴う臨時の報酬等は除かれます。",source:"入管法19条1項2号・施行規則19条・19条の3"},
{id:"tor057",subject:"申請取次",question:"外国人は就労資格証明書の交付を受けることができるが、その交付を受けていなくても、就労可能な在留資格や資格外活動許可を有していれば就労活動を行うことができる。",correct:true,explain:"就労資格証明書（入管法19条の2）は、就労できる資格を有することを雇用主等に明らかにするための立証手段にすぎません。証明書がなくても、就労可能な在留資格や資格外活動許可があれば就労できます。転職時の雇用主の安心材料として交付申請を提案するのが実務的な使い方です。",source:"入管法19条の2"},
{id:"tor058",subject:"申請取次",question:"「留学」の在留資格をもって大学において教育を受ける者が、当該大学との契約に基づいて教育又は研究を補助する活動に従事して報酬を受ける場合、資格外活動許可は不要である。",correct:true,explain:"大学との契約に基づくTA・RA等の教育研究補助活動は、施行規則19条の3第3号により資格外活動許可が不要とされています。通常のアルバイトとは異なる特例扱いである点を押さえましょう。",source:"入管法19条・施行規則19条の3第3号"},
{id:"tor059",subject:"申請取次",question:"在留資格が「公用」である者は、資格外活動許可（入管法19条2項）の対象となる。",correct:true,explain:"資格外活動許可の対象となるのは、入管法別表第1の上欄の在留資格すべてです。「公用」も別表第1の在留資格なので対象になります。別表第2（身分系）はそもそも活動制限がないため資格外活動許可の対象外、と対で整理しましょう。",source:"入管法19条2項・別表第1"},
{id:"tor060",subject:"申請取次",question:"在留資格が「経営・管理」である者は、資格外活動許可（入管法19条2項）の対象とはならない。",correct:false,explain:"資格外活動許可の対象は別表第1の上欄の在留資格であり、「経営・管理」も含まれます。就労系の在留資格者でも、本来の活動に属しない報酬活動を行う場合には資格外活動許可が必要になりえます。",source:"入管法19条2項・別表第1"},
{id:"tor061",subject:"申請取次",question:"「経営・管理」で貿易会社の経営に従事し、講師業を業務としていない者が、地元の商工会議所が開催する経営セミナーにて謝金を得て講師を務める場合、資格外活動許可は不要である。",correct:true,explain:"「業として行うものではない講演に対する謝金」は、資格外活動の判断における「報酬」から除外されています（入管法19条1項1号かっこ書）。単発の講演謝金は資格外活動にならない、という実務でも相談を受けやすい論点です。反復継続して講師業を行う場合は別途検討が必要です。",source:"入管法19条1項1号・施行規則19条の3"},
{id:"tor062",subject:"申請取次",question:"経営者甲の配偶者で「家族滞在」の在留資格を付与されている者が、甲が経営する会社で報酬を得て週3日・1日5時間程度、簡単な帳簿整理に従事する場合、資格外活動許可が必要である。",correct:true,explain:"家族滞在の者が報酬を受ける活動に従事するには、勤務先が配偶者の会社であっても、短時間・簡易な業務であっても、資格外活動許可が必要です。「家族の会社を手伝うだけなら不要」という誤解が多いので、経営・管理のお客様には配偶者の就労についても必ず確認しましょう。",source:"入管法19条1項2号・施行規則19条"},
{id:"tor063",subject:"申請取次",question:"大学在学中に資格外活動の許可を受けた「留学」の在留資格をもって在留する者は、大学卒業後も「留学」の在留期間満了までは、当該許可をもってアルバイト活動を行うことができる。",correct:false,explain:"所属していた教育機関を卒業すると、在留期間がまだ残っていても、資格外活動許可に基づくアルバイトはできなくなります（施行規則19条5項1号参照）。卒業後・就職前の期間のアルバイト継続は不可、という留学生からの相談が多い論点です。",source:"入管法19条・施行規則19条5項1号"},
{id:"tor064",subject:"申請取次",question:"「日本人の配偶者等」の者が再入国の許可を受けて出国中に日本人配偶者と離婚した場合、在留資格該当性が失われるため、有効な旅券を所持し上陸拒否事由に該当しないときでも、当該再入国の許可によって本邦に上陸することはできない。",correct:false,explain:"再入国許可（みなし再入国許可を含む）を受けている者の上陸審査では、在留資格該当性は審査されません。上陸の条件となるのは①旅券・査証の有効性と④上陸拒否事由非該当のみです。したがって離婚後でも再入国許可により上陸できます（もっとも、帰国後は在留資格の変更等の検討が必要になります）。",source:"入管法7条1項"},
{id:"tor065",subject:"申請取次",question:"有効な旅券及び特別永住者証明書を所持する特別永住者は、出国前に再入国許可を受けていなくても、出国時に入国審査官に再入国の意図を表明して出国すれば、出国の日から2年以内の再入国により従前どおり特別永住者としての活動を継続できる。",correct:true,explain:"みなし再入国許可の制度により、有効な旅券（中長期在留者は在留カード、特別永住者は特別永住者証明書）を所持して再入国の意図を表明して出国すれば、再入国許可を受けたものとみなされます。有効期間は一般の外国人が1年、特別永住者は2年です（入管特例法23条2項）。1年と2年の違いが頻出です。",source:"入管法26条の2・入管特例法23条"},
{id:"tor066",subject:"申請取次",question:"みなし再入国許可で出国し、やむを得ない事情で出国後1年以内に本邦に戻れない場合は、在留期間が残っている場合に限り、在外日本公館で再入国許可の有効期間の延長を行うことができる。",correct:false,explain:"みなし再入国許可は、在外公館での有効期間の延長が一切できません（延長制度があるのは通常の再入国許可のみ）。1年を超える出国の可能性がある場合は、出国前に通常の再入国許可を取得しておくよう案内するのが実務上の鉄則です。",source:"入管法26条の2"},
{id:"tor067",subject:"申請取次",question:"日本の国籍を離脱した者又は出生その他の事由により上陸の手続を経ることなく本邦に在留することとなる外国人は、その事由が生じた日から60日を限り、在留資格を有することなく本邦に在留することができる。",correct:true,explain:"入管法22条の2第1項により、国籍離脱や出生等の日から60日間は在留資格なしで適法に在留できます。引き続き在留するには、この期間内（在留資格取得は事由発生から30日以内）に在留資格取得許可申請等の手続が必要です。「60日」という数字は確実に押さえましょう。",source:"入管法22条の2"},
{id:"tor068",subject:"申請取次",question:"日米地位協定に定める合衆国軍隊の構成員、軍属及びこれらの者の家族で、同協定に定める地位又は身分を失った後も本邦での在留を希望する者も、入管法22条の2第1項に基づき、その事由が生じた日から60日に限り在留資格を有することなく本邦に在留することができる。",correct:true,explain:"地位協定上の地位・身分を失った者も、「出生その他の事由により上陸の手続を経ることなく本邦に在留することとなる外国人」に該当し、60日間の在留が認められます。出生以外にもこの規定が適用される例がある、という広がりを押さえる問題です。",source:"入管法22条の2"},
{id:"tor069",subject:"申請取次",question:"「虚偽の住居地を届け出ていた」ことを理由に在留資格が取り消されることがある。",correct:true,explain:"入管法22条の4第1項10号により、虚偽の住居地の届出は在留資格の取消事由です。住居地関連では、届出をしないこと（9号）、虚偽の届出（10号）がそれぞれ取消事由になっている点を整理しておきましょう。",source:"入管法22条の4第1項10号"},
{id:"tor070",subject:"申請取次",question:"上陸許可により新たに中長期在留者となった者が、当該上陸許可の証印を受けた日から90日以内に住居地の届出をしないことを理由に、在留資格が取り消されることがある。",correct:true,explain:"入管法22条の4第1項8号により、新たに中長期在留者となった者が90日以内に住居地を届け出ないこと（正当な理由がある場合を除く）は取消事由です。「90日以内」という期間と、届出先が市区町村役場である点をセットで覚えましょう。",source:"入管法22条の4第1項8号"},
{id:"tor071",subject:"申請取次",question:"中長期在留者には在留カードの常時携帯義務があるので、行政書士が在留資格変更許可申請や在留期間更新許可申請を取り次ぐ場合は、在留カードの原本を預かることはできず、コピーを申請窓口に提示することになる。",correct:false,explain:"届出行政書士は、本人に代わって申請書等の提出及び旅券・在留カードの「提示」を行うことが施行規則上認められており、原本を預かって窓口に提示します。コピーの提示では足りません。常時携帯義務との関係で誤解しやすいですが、取次のための原本預かりは制度上予定されています。お客様から預かる際は預り証の交付を忘れずに。",source:"入管法23条・施行規則20条4項・59条の6第3項1号"},
{id:"tor072",subject:"申請取次",question:"「日本人の配偶者等」の在留資格で在留する外国人が、その日本人配偶者と離婚又は死別した場合、離婚又は死別の日から14日以内に、出入国在留管理庁長官に対しその旨を届け出なければならない。",correct:true,explain:"入管法19条の16により、配偶者の身分に基づく家族滞在・日本人の配偶者等・永住者の配偶者等の在留者は、離婚・死別から14日以内の届出義務があります。一方、「定住者」の外国人配偶者にはこの届出義務がない点が対比で問われます。",source:"入管法19条の16"},
{id:"tor073",subject:"申請取次",question:"不法入国者、不法上陸者及び不法就労助長者の罰則規定は入管法にあり、資格外活動の許可を受けることなく在留資格外の就労活動を専ら行っていると明らかに認められる者の罰則規定も入管法にある。",correct:true,explain:"不法入国・不法上陸・不法就労助長罪（入管法73条の2）のほか、資格外活動を「専ら」行っていると明らかに認められる者の罰則（入管法70条1項4号）も入管法に定められています。雇用主側の不法就労助長罪は、行政書士が企業に注意喚起すべき重要論点です。",source:"入管法70条1項4号・73条の2"}
];

let DB={questions:[],timeLimitOn:true};
let current=null, mode='all', queue=[], answered=false, editId=null, truthSel=null;
let sessionTotal=0, sessionDone=0, sessionOK=0;
let timerInt=null, timeLeft=0;

/* ---------- storage（localStorageが使えない環境でも動くようフォールバック） ---------- */
const mem={};
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return mem[k]||null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}}
function uid(){return 'q'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function save(){lsSet(KEY,JSON.stringify(DB));}

function migrateQ(q){
  return Object.assign({},q,{
    id:q.id||uid(),
    attempts:q.attempts||0,
    wrong:q.wrong||0,
    stage:(q.stage!=null?q.stage:0),
    due:(q.due!==undefined?q.due:(q.attempts>0?Date.now():null))
  });
}
function normalize(){
  DB.questions.forEach(q=>{
    if(q.stage==null)q.stage=0;
    if(q.due===undefined)q.due=(q.attempts>0?Date.now():null);
    if(q.attempts==null)q.attempts=0;
    if(q.wrong==null)q.wrong=0;
  });
}
/* 内蔵40問を、まだ持っていない分だけ合体（既存データは一切消さない） */
function mergePreloaded(){
  const have=new Set(DB.questions.map(q=>q.id));
  let added=0;
  PRELOADED.forEach(p=>{
    if(!have.has(p.id)){
      DB.questions.push(Object.assign({attempts:0,wrong:0,stage:0,due:null},p));
      added++;
    }
  });
  return added;
}
function load(){
  const raw=lsGet(KEY);
  if(raw){
    try{DB=JSON.parse(raw);}catch(e){DB={questions:[],timeLimitOn:true};}
    if(!Array.isArray(DB.questions))DB.questions=[];
    normalize();
    const n=mergePreloaded();
    if(n>0)toastLater('内蔵問題を '+n+' 問追加しました🦐（申請取次ほか）');
  }else{
    /* 旧アプリ（司法試験ドリル）のデータが同じブラウザにあれば自動で引き継ぐ */
    const old=lsGet(OLD_KEY);
    if(old){
      try{
        const d=JSON.parse(old);
        if(d.questions&&Array.isArray(d.questions)){
          DB.questions=d.questions.map(migrateQ);
          DB.timeLimitOn=(d.timeLimitOn!==false);
          toastLater('旧アプリの問題と記録を引き継ぎました（'+DB.questions.length+'問）');
        }
      }catch(e){}
    }
    const n=mergePreloaded();
    if(n>0&&!old)toastLater('入管法・建設業許可・申請取次 計'+n+'問入りでスタート！🦐');
  }
  DB.timeLimitOn=(DB.timeLimitOn!==false);
  normalize();
  save();
}

/* ---------- エビングハウス復習エンジン ---------- */
function applySR(q,isCorrect){
  q.attempts++;
  if(isCorrect){
    q.stage=Math.min(q.stage+1,MAX_LV);
    q.due=Date.now()+INTERVALS[Math.min(q.stage-1,MAX_LV-1)]*DAY;
  }else{
    q.wrong++;
    q.stage=0;
    q.due=Date.now();
  }
}
function dueList(){
  const now=Date.now();
  return DB.questions.filter(q=>q.due!=null&&q.due<=now).sort((a,b)=>a.due-b.due);
}
function fmtDue(ts){
  if(ts==null)return '—';
  if(ts<=Date.now())return 'いま復習どき';
  const d=new Date(ts),n=new Date();
  const md=(d.getMonth()+1)+'/'+d.getDate();
  const dd=Math.round((new Date(d.getFullYear(),d.getMonth(),d.getDate())-new Date(n.getFullYear(),n.getMonth(),n.getDate()))/DAY);
  if(dd<=0)return '今日中（'+md+'）';
  if(dd===1)return '明日（'+md+'）';
  return dd+'日後（'+md+'）';
}
function lvDots(stage){
  let s='';
  for(let i=0;i<MAX_LV;i++)s+=(i<stage?'●':'○');
  return s;
}

/* ---------- 画面遷移 ---------- */
function goView(v){
  stopTimer();
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  if(v==='home')refreshHome();
  if(v==='manage')renderManage();
  if(v==='stats')renderStats();
  window.scrollTo(0,0);
}
function refreshHome(){
  document.getElementById('subCount').textContent='問題 '+DB.questions.length+' 問';
  const due=dueList().length;
  const badge=document.getElementById('ebbBadge');
  badge.style.display=due>0?'flex':'none';
  badge.textContent=due;
  document.getElementById('ebbSub').textContent=due>0?('復習どきの問題が '+due+' 問あります'):'忘れる直前の問題から復習';
  const miss=DB.questions.filter(q=>q.wrong>0).length;
  document.getElementById('qMiss').textContent=miss;
  const at=DB.questions.reduce((s,q)=>s+q.attempts,0);
  const wr=DB.questions.reduce((s,q)=>s+q.wrong,0);
  document.getElementById('qAcc').textContent=at>0?Math.round((at-wr)/at*100)+'%':'—';
  const sel=document.getElementById('subjSelect');
  const cur=sel.value;
  sel.innerHTML='<option value="">— 科目を選ぶとすぐ出題 —</option>'+
    subjects().map(s=>'<option value="'+escA(s)+'">'+escH(s)+'</option>').join('');
  sel.value=cur||'';
}
function subjects(){
  return [...new Set(DB.questions.map(q=>q.subject||'（科目なし）'))];
}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return escH(s).replace(/"/g,'&quot;');}

/* ---------- 出題 ---------- */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(m,subject){
  mode=m;
  if(m==='ebbing'){
    queue=dueList();
    if(!queue.length){toast('いま復習どきの問題はありません🦐 また後で！');return;}
  }else if(m==='mistakes'){
    queue=shuffle(DB.questions.filter(q=>q.wrong>0));
    if(!queue.length){toast('間違えた問題はまだありません');return;}
  }else if(m==='subject'){
    queue=shuffle(DB.questions.filter(q=>(q.subject||'（科目なし）')===subject));
    if(!queue.length){toast('この科目の問題がありません');return;}
  }else{
    queue=shuffle(DB.questions.slice());
    if(!queue.length){toast('問題がありません。問題管理から追加してください');return;}
  }
  sessionTotal=queue.length;sessionDone=0;sessionOK=0;
  document.getElementById('doneBox').style.display='none';
  document.getElementById('quizBody').style.display='block';
  goView('quiz');
  nextQ(true);
}
function startBySubject(){
  const s=document.getElementById('subjSelect').value;
  if(s)startQuiz('subject',s);
}
function nextQ(first){
  if(!first&&queue.length===0){finishQuiz();return;}
  current=queue.shift();
  if(!current){finishQuiz();return;}
  answered=false;
  document.getElementById('qProg').textContent=(sessionDone+1)+' / '+sessionTotal;
  const md=document.getElementById('qMode');
  md.textContent=mode==='ebbing'?'🦐 エビング':mode==='mistakes'?'間違いだけ':mode==='subject'?'科目別':'ランダム';
  md.classList.toggle('ebb',mode==='ebbing');
  document.getElementById('qSubj').textContent=current.subject||'（科目なし）';
  document.getElementById('qText').textContent=current.question;
  document.getElementById('result').classList.remove('show');
  document.getElementById('ansRow').style.display='flex';
  startTimer();
  window.scrollTo(0,0);
}
function answer(choice){
  if(answered||!current)return;
  answered=true;stopTimer();
  const isCorrect=(choice===current.correct);
  applySR(current,isCorrect);
  sessionDone++;if(isCorrect)sessionOK++;
  save();
  const v=document.getElementById('verdict');
  if(choice===null){v.textContent='わからん → 復習リストへ';v.className='verdict ng';}
  else if(isCorrect){v.textContent='正解！';v.className='verdict ok';}
  else{v.textContent='ざんねん…';v.className='verdict ng';}
  document.getElementById('truth').innerHTML='答え：<b style="font-size:20px;color:'+(current.correct?'var(--ok)':'var(--ng)')+'">'+(current.correct?'○':'×')+'</b>';
  const exp=document.getElementById('exp');
  if(current.explain){exp.style.display='block';exp.textContent=current.explain;}
  else exp.style.display='none';
  const src=document.getElementById('src');
  if(current.source){src.style.display='block';src.textContent='根拠：'+current.source;}
  else src.style.display='none';
  document.getElementById('lvInfo').innerHTML='記憶レベル <b>'+lvDots(current.stage)+'</b>　次の復習：'+fmtDue(current.due);
  document.getElementById('ansRow').style.display='none';
  document.getElementById('result').classList.add('show');
}
function finishQuiz(){
  stopTimer();
  document.getElementById('quizBody').style.display='none';
  const box=document.getElementById('doneBox');
  box.style.display='block';
  if(mode==='ebbing'){
    document.getElementById('doneTitle').textContent='復習ぜんぶ完了！🦐';
    const soon=DB.questions.filter(q=>q.due!=null&&q.due>Date.now()).sort((a,b)=>a.due-b.due)[0];
    document.getElementById('doneMsg').textContent=(sessionOK+' / '+sessionDone+' 正解。')+(soon?('次の復習どきは '+fmtDue(soon.due)+' です。'):'');
  }else{
    document.getElementById('doneTitle').textContent='おつかれさま！';
    document.getElementById('doneMsg').textContent=sessionOK+' / '+sessionDone+' 正解でした。';
  }
}
function endQuiz(){stopTimer();goView('home');}

/* ---------- タイマー ---------- */
function startTimer(){
  stopTimer();
  const bar=document.getElementById('timerBar');
  if(!DB.timeLimitOn){bar.style.display='none';return;}
  bar.style.display='block';
  timeLeft=TIME_LIMIT;
  const fill=document.getElementById('timerFill');
  fill.style.width='100%';fill.className='';
  timerInt=setInterval(()=>{
    timeLeft--;
    const pct=Math.max(0,timeLeft/TIME_LIMIT*100);
    fill.style.width=pct+'%';
    if(timeLeft<=3)fill.className='hurry';
    else if(timeLeft<=6)fill.className='warn';
    if(timeLeft<=0){stopTimer();if(!answered)answer(null);}
  },1000);
}
function stopTimer(){if(timerInt){clearInterval(timerInt);timerInt=null;}}

/* ---------- 問題管理 ---------- */
function renderManage(){
  const fil=document.getElementById('mFilter');
  const cur=fil.value;
  fil.innerHTML='<option value="">すべての科目</option>'+
    subjects().map(s=>'<option value="'+escA(s)+'">'+escH(s)+'</option>').join('');
  fil.value=cur||'';
  const dl=document.getElementById('subjList');
  dl.innerHTML=subjects().map(s=>'<option value="'+escA(s)+'">').join('');
  const list=document.getElementById('mList');
  const items=DB.questions.filter(q=>!fil.value||(q.subject||'（科目なし）')===fil.value);
  if(!items.length){list.innerHTML='<p style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0">問題がありません。「＋追加」から作成できます。</p>';return;}
  list.innerHTML=items.map(q=>`
    <div class="m-item">
      <div class="t">${escH(q.question)}</div>
      <div class="meta">
        <span class="mk ${q.correct?'o':'x'}">${q.correct?'○':'×'}</span>
        <span>${escH(q.subject||'（科目なし）')}</span>
        <span>記憶 ${lvDots(q.stage)}</span>
        <span>復習：${fmtDue(q.due)}</span>
      </div>
      <div class="ops">
        <button onclick="editQ('${q.id}')">編集</button>
        <button class="del" onclick="delQ('${q.id}')">削除</button>
      </div>
    </div>`).join('');
}
function openForm(){
  editId=null;truthSel=null;
  document.getElementById('f-subject').value='';
  document.getElementById('f-question').value='';
  document.getElementById('f-explain').value='';
  document.getElementById('f-source').value='';
  setTruth(null);
  document.getElementById('form').classList.add('show');
  document.getElementById('f-subject').focus();
}
function setTruth(v){
  truthSel=v;
  document.getElementById('tO').className=(v===true?'sel-o':'');
  document.getElementById('tX').className=(v===false?'sel-x':'');
}
function editQ(id){
  const q=DB.questions.find(x=>x.id===id);if(!q)return;
  editId=id;
  document.getElementById('f-subject').value=q.subject||'';
  document.getElementById('f-question').value=q.question;
  document.getElementById('f-explain').value=q.explain||'';
  document.getElementById('f-source').value=q.source||'';
  setTruth(q.correct);
  document.getElementById('form').classList.add('show');
  window.scrollTo(0,0);
}
function delQ(id){
  const q=DB.questions.find(x=>x.id===id);if(!q)return;
  if(!confirm('この問題を削除しますか？\n「'+q.question.slice(0,30)+'…」'))return;
  DB.questions=DB.questions.filter(x=>x.id!==id);
  save();renderManage();refreshHomeSilent();
  toast('削除しました');
}
function saveForm(){
  const subject=document.getElementById('f-subject').value.trim();
  const question=document.getElementById('f-question').value.trim();
  const explain=document.getElementById('f-explain').value.trim();
  const source=document.getElementById('f-source').value.trim();
  if(!question){toast('問題文を入力してください');return;}
  if(truthSel===null||truthSel===undefined){toast('正解（○か×）を選んでください');return;}
  if(editId){
    const q=DB.questions.find(x=>x.id===editId);
    if(q){q.subject=subject;q.question=question;q.correct=truthSel;q.explain=explain;q.source=source;}
    toast('更新しました');
  }else{
    DB.questions.push({id:uid(),subject,question,correct:truthSel,explain,source,attempts:0,wrong:0,stage:0,due:null});
    toast('追加しました');
  }
  save();
  document.getElementById('form').classList.remove('show');
  editId=null;
  renderManage();refreshHomeSilent();
}
function refreshHomeSilent(){document.getElementById('subCount').textContent='問題 '+DB.questions.length+' 問';}

/* ---------- 学習記録 ---------- */
function renderStats(){
  const at=DB.questions.reduce((s,q)=>s+q.attempts,0);
  const wr=DB.questions.reduce((s,q)=>s+q.wrong,0);
  document.getElementById('sAttempts').textContent=at;
  document.getElementById('sAcc').textContent=at>0?Math.round((at-wr)/at*100)+'%':'—';
  const now=Date.now();
  document.getElementById('dueNow').textContent=dueList().length+'問';
  document.getElementById('dueTom').textContent=DB.questions.filter(q=>q.due!=null&&q.due<=now+DAY).length+'問';
  document.getElementById('dueWeek').textContent=DB.questions.filter(q=>q.due!=null&&q.due<=now+7*DAY).length+'問';
  const dist=[];
  for(let lv=0;lv<=MAX_LV;lv++)dist.push(DB.questions.filter(q=>q.stage===lv).length);
  const max=Math.max(1,...dist);
  document.getElementById('lvDist').innerHTML=dist.map((n,lv)=>`
    <div class="lvrow">
      <span class="lab">${lvDots(lv)}</span>
      <span class="bar"><i style="width:${n/max*100}%"></i></span>
      <span class="n">${n}問</span>
    </div>`).join('');
  const sw=document.getElementById('swTimer');
  sw.classList.toggle('on',DB.timeLimitOn);
  sw.setAttribute('aria-checked',DB.timeLimitOn);
}
function toggleTimer(){
  DB.timeLimitOn=!DB.timeLimitOn;save();renderStats();
  toast(DB.timeLimitOn?'10秒タイマー：ON':'10秒タイマー：OFF');
}
function resetStats(){
  if(!confirm('学習記録（正答率・記憶レベル・復習予定）をすべてリセットします。問題自体は消えません。よろしいですか？'))return;
  DB.questions.forEach(q=>{q.attempts=0;q.wrong=0;q.stage=0;q.due=null;});
  save();renderStats();refreshHomeSilent();
  toast('学習記録をリセットしました');
}

/* ---------- バックアップ ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const d=new Date();
  a.download='ox_ebbing_backup_'+d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2)+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('バックアップを書き出しました');
}
function importData(ev){
  const file=ev.target.files[0];
  if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(!d.questions||!Array.isArray(d.questions))throw new Error('形式が違います');
      /* 合体（マージ）方式：同じidは読み込んだ側で上書き、それ以外は追加。既存は消さない */
      const map=new Map(DB.questions.map(q=>[q.id,q]));
      let added=0,updated=0;
      d.questions.map(migrateQ).forEach(q=>{
        if(map.has(q.id)){map.set(q.id,q);updated++;}
        else{map.set(q.id,q);added++;}
      });
      DB.questions=[...map.values()];
      if(d.timeLimitOn!==undefined)DB.timeLimitOn=(d.timeLimitOn!==false);
      normalize();save();
      refreshHomeSilent();renderStats();
      toast('読み込み完了：追加 '+added+' 問／更新 '+updated+' 問');
    }catch(e){
      toast('読み込めませんでした：JSONの形式を確認してください');
    }
    ev.target.value='';
  };
  r.readAsText(file);
}

/* ---------- toast ---------- */
let toastT=null,pendingToasts=[];
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2600);
}
function toastLater(msg){pendingToasts.push(msg);}

/* ---------- init ---------- */
load();
refreshHome();
setTimeout(()=>{if(pendingToasts.length)toast(pendingToasts.join('　'));},400);
</script>
